<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukhraj | Portfolio</title>
    <style>
        /* पूरी वेबसाइट के लिए बेसिक डार्क सेटिंग्स */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a; /* गहरा डार्क ब्लू बैकग्राउंड */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* नेविगेशन बार (Header) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b; /* थोड़ा हल्का डार्क बार */
            padding: 20px 40px;
            border-radius: 12px;
            margin-bottom: auto; /* कंटेंट को बीच में रखने के लिए */
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #38bdf8; /* चमकीला नीला रंग */
        }

        nav a {
            text-decoration: none;
            color: #94a3b8; /* हल्का ग्रे रंग टेक्स्ट के लिए */
            margin-left: 25px;
            font-weight: 600;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ffffff; /* होवर करने पर सफेद */
        }

        /* मुख्य कंटेंट एरिया (Hero Section) */
        .hero-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding: 80px 20px;
            margin-bottom: auto; /* वर्टिकल सेंटर के लिए */
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        /* 'Sukhraj Website' को अलग रंग देने के लिए */
        .highlight {
            color: #38bdf8; 
            display: block; /* नई लाइन में लाने के लिए */
            margin-top: 10px;
        }

        p {
            font-size: 1.3rem;
            color: #64748b; /* थोड़ा धीमा टेक्स्ट रंग */
            max-width: 500px;
            margin: 0 auto 40px auto;
            font-weight: 400;
        }

        /* ग्लोइंग इफ़ेक्ट वाला कांटेक्ट बटन */
        .btn-contact {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a; /* बटन के अंदर डार्क टेक्स्ट */
            padding: 16px 45px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            /* ग्लोइंग शैडो इफ़ेक्ट */
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); 
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-contact:hover {
            transform: scale(1.03);
            box-shadow: 0 0 35px rgba(56, 189, 248, 0.7);
        }

        /* मोबाइल रेस्पॉन्सिव सेटिंग्स */
        @media (max-width: 600px) {
            header {
                padding: 15px 20px;
            }
            .logo {
                font-size: 20px;
            }
            nav a {
                margin-left: 15px;
                font-size: 0.9rem;
            }
            h1 {
                font-size: 2.3rem;
            }
            p {
                font-size: 1.1rem;
            }
            .btn-contact {
                padding: 14px 35px;
                font-size: 1rem;
                width: 100%; /* मोबाइल पर बटन पूरा चौड़ा दिखेगा */
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- हेडर सेक्शन -->
    <header>
        <div class="logo">Sukhraj.</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Projects</a>
        </nav>
    </header>

    <!-- मुख्य कंटेंट -->
    <div class="hero-container">
        <h1>Welcome to <span class="highlight">Sukhraj Website</span></h1>
        <p>This is my first professional portfolio website.</p>
        
        <!-- आपकी इंस्टाग्राम आईडी का लिंक यहाँ जोड़ दिया गया है -->
        <a href="https://instagram.com" target="_blank" class="btn-contact">Contact Me</a>
    </div>

</body>
    </html> 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool AI Animation Card</title>
    <style>
        /* पूरे पेज का बैकग्राउंड और लेआउट */
        body {
            margin: 0;
            padding: 0;
            background: #0d1117; /* GitHub डार्क मोड कलर */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* एनिमेटेड कार्ड कंटेनर */
        .animation-card {
            position: relative;
            width: 320px;
            height: 420px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* घूमता हुआ बैकग्राउंड ग्रेडिएंट (बॉर्डर इफेक्ट के लिए) */
        .animation-card::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 700px;
            background: linear-gradient(#00ccff, #d400d4);
            animation: rotateGlow 4s linear infinite;
        }

        /* कार्ड का अंदरूनी हिस्सा जो बॉर्डर को छुपाता है */
        .animation-card::after {
            content: '';
            position: absolute;
            background: #0d1117;
            inset: 4px; /* बॉर्डर की मोटाई */
            border-radius: 16px;
        }

        /* कार्ड के अंदर का कंटेंट */
        .content {
            z-index: 10;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }

        .content h2 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00ccff, #d400d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content p {
            font-size: 1em;
            color: #8b949e;
            line-height: 1.6;
        }

        /* ग्लोइंग पल्स इफेक्ट (नीचे छोटा सर्कल) */
        .pulse-circle {
            width: 20px;
            height: 20px;
            background: #00ccff;
            border-radius: 50%;
            margin: 20px auto 0;
            box-shadow: 0 0 10px #00ccff, 0 0 30px #00ccff, 0 0 60px #00ccff;
            animation: pulse 1.5s infinite alternate;
        }

        /* 1. घूमने वाला एनिमेशन */
        @keyframes rotateGlow {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* 2. धड़कने (Pulse) वाला एनिमेशन */
        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            100% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <!-- एनिमेटेड कार्ड -->
    <div class="animation-card">
        <div class="content">
            <h2>Welcome User</h2>
            <p>This is a live CSS glowing border animation created for your website or profile.</p>
            <!-- पल्स डॉट -->
            <div class="pulse-circle"></div>
        </div>
    </div>

</body>
</html>
